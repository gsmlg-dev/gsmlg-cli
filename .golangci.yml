version: "2"
run:
  tests: true
linters:
  disable:
    - dupl
    - errcheck
    - funlen
    - goconst
    - gocyclo
    - gosec
    - lll
    - misspell
    - revive
    - unconvert
    - whitespace
  settings:
    dupl:
      threshold: 150
    errcheck:
      check-type-assertions: false
      check-blank: false
    funlen:
      lines: 150
      statements: 80
    goconst:
      min-len: 3
      min-occurrences: 5
    gocyclo:
      min-complexity: 30
    gosec:
      excludes:
        - G306
    govet:
      enable-all: false
    lll:
      line-length: 200
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - funlen
          - gocyclo
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
