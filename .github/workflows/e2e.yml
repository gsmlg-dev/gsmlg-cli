name: E2E

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to test"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/gsmlg-dev/gsmlg-golang
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        if: github.event_name == 'push'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure git for private modules
        if: github.event_name == 'push'
        env:
          TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: git config --global url."https://gsmlg:${TOKEN}@github.com".insteadOf "https://github.com"

      - name: Build current binary
        if: github.event_name == 'push'
        run: |
          mkdir -p e2e-bin
          version="e2e-${GITHUB_SHA::7}"
          go build \
            -trimpath \
            -ldflags "-w -s -X github.com/gsmlg-dev/gsmlg-cli/cmd.Version=${version}" \
            -o e2e-bin/gsmlg-cli \
            main.go

      - name: Download release artifacts
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p dist
          gh release download "v${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "gsmlg-cli_${VERSION}_linux_amd64.tar.gz" \
            --dir dist
          gh release download "v${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "checksums.txt" \
            --dir dist

      - name: Verify artifact checksum
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cd dist
          sha256sum --check --ignore-missing checksums.txt
          test -f "gsmlg-cli_${VERSION}_linux_amd64.tar.gz"

      - name: Extract release binary
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p e2e-bin
          tar -xzf "dist/gsmlg-cli_${VERSION}_linux_amd64.tar.gz" -C e2e-bin
          chmod +x e2e-bin/gsmlg-cli

      - name: Run release smoke tests
        run: |
          version_output="$(./e2e-bin/gsmlg-cli --version)"
          echo "$version_output"
          grep -q "Version:" <<<"$version_output"
          ./e2e-bin/gsmlg-cli bin-install --help
